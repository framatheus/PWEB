<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedra, Papel e Tesoura</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Pedra, Papel e Tesoura</h1>

        <p>Escolha uma opção:</p>

        <div class="botoes">
            <button onclick="jogar('pedra')">Pedra</button>
            <button onclick="jogar('papel')">Papel</button>
            <button onclick="jogar('tesoura')">Tesoura</button>
        </div>

        <div class="resultado">
            <p><strong>Você escolheu:</strong> <span id="jogador"></span> </p>
            <p><strong>Computador escolheu:</strong> <span id="computador"></span> </p>
            <p><strong>Resultado:</strong> <span id="mensagem"></span> </p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
