<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Média do Aluno</title>
</head>
<body>
  <h1>Cálculo da Média</h1>

  <label for="nome">Nome do aluno:</label><br>
  <input type="text" id="nome" placeholder="Digite o nome"><br><br>

  <label for="nota1">Nota 1:</label><br>
  <input type="number" id="nota1" step="0.01" placeholder="Digite a nota 1"><br><br>

  <label for="nota2">Nota 2:</label><br>
  <input type="number" id="nota2" step="0.01" placeholder="Digite a nota 2"><br><br>

  <label for="nota3">Nota 3:</label><br>
  <input type="number" id="nota3" step="0.01" placeholder="Digite a nota 3"><br><br>

  <label for="nota4">Nota 4:</label><br>
  <input type="number" id="nota4" step="0.01" placeholder="Digite a nota 4"><br><br>

  <button onclick="calcularMedia()">Calcular Média</button>

  <h2>Resultado:</h2>
  <p id="resultado"></p>

  <script src="js/media.js"></script>
</body>
</html>
